<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Minesweeper Screenshot</title>
<link rel="stylesheet" href="../styles.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 24px 28px 24px; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
         background: #0d1117; color: #e6edf3; }
  h2 { font-size: 14px; font-weight: 600; margin: 0 0 4px; opacity: 0.6; }
  table.ContributionCalendar-grid { border-spacing: 3px; border-collapse: separate; display:none; }
  td.ContributionCalendar-day { width: 11px; height: 11px; border-radius: 2px; }
  tool-tip { display: none; }
</style>
</head>
<body>
  <div class="js-yearly-contributions">
    <h2>contributions</h2>
    <table class="ContributionCalendar-grid js-calendar-graph-table"><tbody id="cal"></tbody></table>
  </div>
  <div id="tips"></div>

<script>
  (function () {
    const cal = document.getElementById('cal'), tips = document.getElementById('tips');
    const rows = []; for (let r=0;r<7;r++){ const tr=document.createElement('tr'); rows.push(tr); cal.appendChild(tr); }
    const start = new Date('2025-06-15T00:00:00');
    const end = new Date('2026-06-14T00:00:00');
    let seed = 999, i = 0;
    const rnd = () => (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;
    for (let t=start.getTime(); t<=end.getTime(); t+=86400000) {
      const d = new Date(t), iso = d.toISOString().slice(0,10);
      const x = rnd(); let level=0;
      if (x>0.5) level=1; if (x>0.72) level=2; if (x>0.87) level=3; if (x>0.95) level=4;
      const count = level===0 ? 0 : level*4 + ((rnd()*5)|0);
      const td = document.createElement('td');
      td.className='ContributionCalendar-day'; td.id='c-'+i;
      td.setAttribute('data-date', iso); td.setAttribute('data-level', String(level));
      rows[d.getDay()].appendChild(td);
      const tip = document.createElement('tool-tip'); tip.setAttribute('for','c-'+i);
      tip.textContent = (count===0?'No contributions':count+' contributions')+' on '+iso+'.';
      tips.appendChild(tip);
      i++;
    }
  })();
</script>
<script src="../src/extract.js"></script>
<script src="../src/minesweeper.js"></script>
<script src="../src/minecraft.js"></script>
<script src="../src/launcher.js"></script>
<script>
  window.addEventListener('load', () => setTimeout(() => {
    // auto-click minesweeper button
    const btn = [...document.querySelectorAll('button')].find(b => b.textContent.includes('扫雷'));
    if (btn) btn.click();
    // click a safe middle tile after brief delay
    setTimeout(() => {
      const tiles = [...document.querySelectorAll('.gms-tile')];
      if (tiles[182]) tiles[182].click();
      document.getElementById('screenshot-ready').textContent = 'ready';
    }, 400);
  }, 300));
</script>
<div id="screenshot-ready" style="display:none"></div>
</body>
</html>
